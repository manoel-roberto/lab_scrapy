version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg14
    container_name: doe_db
    environment:
      POSTGRES_DB: doe_ba
      POSTGRES_USER: manoel
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manoel -d doe_ba"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: doe_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Nota: Para usar GPU, descomente as linhas abaixo se tiver NVIDIA Container Toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  api:
    build: .
    container_name: doe_api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://manoel:password@db:5432/doe_ba
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  worker:
    build: .
    container_name: doe_worker
    command: python src/worker.py
    environment:
      DATABASE_URL: postgresql://manoel:password@db:5432/doe_ba
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  ui:
    build: .
    container_name: doe_ui
    command: streamlit run src/ui/app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pgdata:
  ollama_data:
